# How certinspect is invoked, and the meaning of its exit codes, is the
# contract certminder depends on. Keep this file as the single source of truth
# for operators: edit targets and notifiers here, not in code.

# Path or name of the certinspect executable (must be on PATH or absolute).
certinspect_bin: certinspect

# How often the watch loop runs. Accepts s/m/h/d suffixes (e.g. 30m, 6h, 1d).
interval: 6h

# Where the per-target state (last fingerprint, last status, sent alerts) is
# persisted between runs. '~' is expanded.
state_file: ~/.certminder/state.json

# How many targets to inspect in parallel each cycle.
concurrency: 8

# Optional: write Prometheus metrics for the node_exporter textfile collector.
# Point this at a file inside --collector.textfile.directory. Rewritten
# atomically at the end of every cycle. Omit to disable.
prometheus_file: /var/lib/node_exporter/textfile/certminder.prom

# Applied to every target unless the target overrides them.
defaults:
  port: 443
  verify: true        # run certinspect --verify (chain + OCSP/CRL revocation)
  days: 30            # EXPIRING window (certinspect --days)
  critical_days: 15   # CRITICAL window (certinspect --critical-days)
  timeout: 5
  # Optional maximum-validity policy (certinspect exit code 9 ->
  # POLICY_VIOLATION). Use ONE of the two:
  #   cab_forum: true      # date-aware CA/Browser Forum cap (398->200->100->47)
  #   not_after_max: 47    # or pin an explicit limit in days
  # Other opt-in policy checks (also exit code 9 -> POLICY_VIOLATION):
  #   require_sct: true            # require embedded Certificate Transparency SCTs
  #   require_must_staple: true    # require the OCSP Must-Staple extension
  #   min_tls_version: TLSv1.2     # fail below this negotiated TLS version

# Alert sinks. Every notifier receives every event in a cycle.
notifiers:
  - type: console
    # timestamp: true   # prefix each line with the local date and time
  - type: slack
    webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
  - type: webhook
    url: "https://example.com/certminder-hook"
    # optional extra headers, e.g. an auth token
    headers:
      Authorization: "Bearer CHANGE_ME"
  - type: email
    host: smtp.example.com
    port: 587            # 587 STARTTLS (use_tls) or 465 implicit TLS (use_ssl)
    use_tls: true
    username: alerts@example.com
    password: CHANGE_ME
    from_addr: alerts@example.com
    to:
      - ops@example.com

# The certificates to watch.
targets:
  - host: example.com

  - host: api.example.com
    port: 8443
    label: "Public API"

  - host: mail.example.com
    starttls: smtp        # one of: smtp, imap, pop3, ftp
    days: 45

  - host: short-lived.example.com
    cab_forum: true       # fail if validity exceeds today's CA/B Forum maximum

  - host: internal.corp.example
    verify: true
    # certinspect supports --cafile/--capath for private PKIs; pass them here
    cafile: /etc/ssl/internal-ca.pem

  - host: hardened.example.com
    require_sct: true           # must carry Certificate Transparency SCTs
    require_must_staple: true   # must carry the OCSP Must-Staple extension
    min_tls_version: TLSv1.2    # must negotiate at least TLS 1.2
